  <style>

<body class="bg-stone-100 text-slate-800 font-sans antialiased">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo, useCallback } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Pizza, Play, Pause, RotateCcw, ChevronRight, ChevronLeft, 
      Check, Thermometer, Droplets, Scale, Clock, Settings, ChefHat,
      ChevronDown, Info, Beaker, Plus, Minus, Wheat, Flame, BookOpen, X, ExternalLink
    } from 'lucide-react';

    // ---------- Data & Constants ----------
    
    const FLOURS = {
      "All Purpose": { h: 60, desc: "Accessible, soft flour. Yields a tender crust. Best for lower temp home ovens." },
      "00 Flour": { h: 62, desc: "Finely milled Italian flour. Requires blistering high heat (750°F+) to brown properly. Extensible and soft." },
      "Bread Flour": { h: 65, desc: "Higher protein. Creates a strong gluten network for a chewy, airy crust. The gold standard for NY style." },
      "White Spelt": { h: 60, desc: "Ancient grain with a nutty flavor. Weaker gluten than wheat, so knead gently to avoid tearing the dough." },
      "Whole Wheat": { h: 72, desc: "Dense and very thirsty. The bran cuts gluten strands, meaning less rise, but offers incredible earthy flavor." },
      "Whole Wheat Spelt": { h: 65, desc: "Earthy, nutty, and highly absorbent. Delicate structure; handle with care during stretching." }
    };

    const STYLES = {
      "Classic Home Oven": { flour: "Bread Flour", h: 64, s: 2.2, o: 3, sg: 2, desc: "Optimized for standard 500°F ovens. Oil and sugar guarantee a beautiful brown, crispy crust." },
      "Neapolitan": { flour: "00 Flour", h: 62, s: 2.8, o: 0, sg: 0, desc: "Blistering hot oven (750°F+). Thin center, puffy airy edges. Fast ferment." },
      "NY Style": { flour: "Bread Flour", h: 63, s: 2.5, o: 2, sg: 1.5, desc: "The classic foldable slice. Crisp bottom, chewy edge, holds heavy toppings." },
      "Pan / Sicilian": { flour: "Bread Flour", h: 72, s: 2.2, o: 3, sg: 0, desc: "Baked in an oiled pan. Thick, airy crumb with a fried-like crispy bottom." },
      "Custom Artisan": { flour: "Bread Flour", h: 65, s: 2.4, o: 1, sg: 0, desc: "Blaze your own trail. You control all the variables." }
    };

    const RESOURCES = [
      {
        title: "PizzaMaking.com Forums",
        url: "https://www.pizzamaking.com/forum/",
        desc: "The absolute holy grail for pizza obsessives. Decades of collective knowledge, dough troubleshooting, and highly technical discussions on every style imaginable."
      },
      {
        title: "Vito Iacopelli (YouTube)",
        url: "https://www.youtube.com/c/vitoiacopelli",
        desc: "Master Neapolitan pizzaiolo. Incredible, energetic tutorials focusing on poolish, biga, and high-hydration stretching techniques ('soft and crunchy!')."
      },
      {
        title: "Serious Eats: The Pizza Lab",
        url: "https://www.seriouseats.com/pizza-recipes-5117816",
        desc: "J. Kenji López-Alt's deep scientific dives into NY style, Pan pizza, and reverse-engineering restaurant classics for the home kitchen."
      },
      {
        title: "Brian Lagerstrom (YouTube)",
        url: "https://www.youtube.com/@BrianLagerstrom",
        desc: "Former fine-dining chef providing highly approachable, restaurant-quality pizza recipes adapted specifically for standard home ovens."
      },
      {
        title: "The Elements of Pizza (Book)",
        url: "https://kensartisan.com/the-elements-of-pizza",
        desc: "Ken Forkish's definitive book on artisan pizza at home. Essential reading for truly understanding dough fermentation and handling."
      }
    ];

    // ---------- Utilities ----------
    const clamp = (n, min, max) => Math.min(max, Math.max(min, Number.isFinite(n) ? n : min));
    const r1 = (n) => Math.round((Number.isFinite(n) ? n : 0) * 10) / 10;
    const r0 = (n) => Math.round(Number.isFinite(n) ? n : 0);

    const formatTime = (totalSeconds) => {
      const h = Math.floor(totalSeconds / 3600);
      const m = Math.floor((totalSeconds % 3600) / 60);
      const s = totalSeconds % 60;
      if (h > 0) return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    };

    // Calculate snapped standard kitchen volumes
    const getVolume = (grams, type) => {
      if (grams > 35 || grams <= 0) return null; // Only for small, non-zero amounts
      
      let density; // Grams per teaspoon
      if (type === 'yeast') density = 3.1;
      else if (type === 'salt') density = 5.9;
      else if (type === 'oil') density = 4.5;
      else if (type === 'sugar') density = 4.2;
      else return null;

      const rawTsp = grams / density;
      
      // Snap to smallest standard measures first
      if (rawTsp < 0.08) return "1 pinch";
      if (rawTsp < 0.18) return "⅛ tsp";
      if (rawTsp < 0.37) return "¼ tsp";
      if (rawTsp < 0.75) return "½ tsp";
      
      // For larger amounts, break down into Tbsp and 0.5 tsp increments
      const tbsp = Math.floor(rawTsp / 3);
      let rem = Math.round((rawTsp % 3) * 2) / 2; // Rounds to nearest 0.5
      
      let finalTbsp = tbsp;
      if (rem === 3) {
        finalTbsp += 1;
        rem = 0;
      }
      
      let parts = [];
      if (finalTbsp > 0) parts.push(`${finalTbsp} Tbsp`);
      
      if (rem > 0 || finalTbsp === 0) {
        if (rem === 0.5) parts.push("½ tsp");
        else if (rem === 1) parts.push("1 tsp");
        else if (rem === 1.5) parts.push("1 ½ tsp");
        else if (rem === 2) parts.push("2 tsp");
        else if (rem === 2.5) parts.push("2 ½ tsp");
      }
      
      return parts.join(" + ");
    };

    const calcIdealHydration = (baseFlour, blendFlour, blendPct) => {
      const baseH = FLOURS[baseFlour].h;
      if (!blendFlour || blendPct === 0) return baseH;
      const altH = FLOURS[blendFlour].h;
      return r0((baseH * ((100 - blendPct) / 100)) + (altH * (blendPct / 100)));
    };

    function yeastPct(cold, temp) {
      let base = cold ? 0.25 : 0.5; 
      const tempDiff = temp - 72; 
      base = base * Math.pow(0.92, tempDiff); 
      return clamp(base, 0.05, 1.5);
    }

    function computeRecipe(cfg) {
      const totalWeight = cfg.balls * cfg.ballWeight;
      const yPct = yeastPct(cfg.cold, cfg.room);
      const sumPct = 100 + cfg.hydration + cfg.salt + yPct + cfg.oil + cfg.sugar;
      
      const totalFlour = totalWeight * (100 / sumPct);
      const blendRatio = cfg.hasBlend ? (cfg.blendPct / 100) : 0;
      
      return {
        flourMain: r0(totalFlour * (1 - blendRatio)),
        flourAlt: cfg.hasBlend ? r0(totalFlour * blendRatio) : 0,
        water: r0(totalFlour * cfg.hydration / 100),
        salt: r1(totalFlour * cfg.salt / 100),
        yeast: r1(totalFlour * yPct / 100),
        oil: r1(totalFlour * cfg.oil / 100),
        sugar: r1(totalFlour * cfg.sugar / 100),
        yPct: r1(yPct),
        total: r0(totalWeight),
        totalFlour: r0(totalFlour)
      };
    }

    // ---------- UI Components ----------

    // Enhanced "Floury Finger" Friendly Slider
    const RangeSlider = ({ label, min, max, step = 1, value, onChange, unit = "", icon: Icon, advice = "", recommended = null }) => {
      
      const handleDec = useCallback(() => {
        onChange(clamp(value - step, min, max));
      }, [value, step, min, max, onChange]);

      const handleInc = useCallback(() => {
        onChange(clamp(value + step, min, max));
      }, [value, step, min, max, onChange]);

      return (
        <div className="mb-8 animate-slide-in">
          <div className="flex justify-between items-end mb-3">
            <label className="font-semibold text-slate-800 flex items-center gap-2">
              {Icon && <Icon className="w-5 h-5 text-orange-500" />}
              {label}
            </label>
            <div className="text-2xl font-black text-orange-600 tracking-tight">{value}{unit}</div>
          </div>
          
          <div className="flex items-center gap-4">
            <button 
              onClick={handleDec}
              className="w-14 h-14 flex shrink-0 items-center justify-center bg-slate-100 text-slate-600 rounded-2xl active:bg-orange-100 active:text-orange-600 transition-colors shadow-sm border border-slate-200"
              aria-label="Decrease"
            >
              <Minus className="w-7 h-7" />
            </button>

            <div className="relative flex-1 py-4">
              <input 
                type="range" min={min} max={max} step={step} value={value} 
                onChange={(e) => onChange(parseFloat(e.target.value))}
                className="fat-slider" 
              />
              {recommended !== null && (
                <div 
                  className="absolute top-2 w-1.5 h-3 bg-blue-500 rounded-full transform -translate-x-1/2 pointer-events-none transition-all shadow-sm"
                  style={{ left: `${((recommended - min) / (max - min)) * 100}%` }}
                >
                  <div className="absolute -top-6 left-1/2 transform -translate-x-1/2 text-[11px] font-bold text-blue-700 bg-blue-50 px-2 py-0.5 rounded-md border border-blue-200 shadow-sm whitespace-nowrap">
                    Ideal: {recommended}{unit}
                  </div>
                </div>
              )}
            </div>

            <button 
              onClick={handleInc}
              className="w-14 h-14 flex shrink-0 items-center justify-center bg-slate-100 text-slate-600 rounded-2xl active:bg-orange-100 active:text-orange-600 transition-colors shadow-sm border border-slate-200"
              aria-label="Increase"
            >
              <Plus className="w-7 h-7" />
            </button>
          </div>

          {advice && (
            <div className="mt-3 flex items-start gap-3 text-sm text-slate-600 bg-white p-4 rounded-xl border border-slate-200 shadow-sm transition-all duration-300">
              <Info className="w-5 h-5 text-blue-500 shrink-0 mt-0.5" />
              <p className="leading-relaxed">{advice}</p>
            </div>
          )}
        </div>
      );
    };

    const PersistentTimer = ({ id, initialSeconds }) => {
      const [endTime, setEndTime] = useState(null);
      const [remaining, setRemaining] = useState(initialSeconds);
      const [isActive, setIsActive] = useState(false);

      useEffect(() => {
        let interval;
        if (isActive && endTime) {
          interval = setInterval(() => {
            const now = Date.now();
            const left = Math.max(0, Math.ceil((endTime - now) / 1000));
            setRemaining(left);
            if (left <= 0) setIsActive(false);
          }, 200); 
        }
        return () => clearInterval(interval);
      }, [isActive, endTime]);

      const toggle = () => {
        if (!isActive) {
          if (remaining === 0) setRemaining(initialSeconds);
          setEndTime(Date.now() + (remaining === 0 ? initialSeconds : remaining) * 1000);
          setIsActive(true);
        } else {
          setIsActive(false);
          setEndTime(null);
        }
      };

      const reset = () => {
        setIsActive(false);
        setEndTime(null);
        setRemaining(initialSeconds);
      };

      return (
        <div className="flex items-center gap-4 bg-slate-800 p-3 rounded-2xl shadow-inner mt-4 w-fit">
          <div className="text-3xl font-mono font-bold text-white tracking-widest w-[110px] text-center">
            {formatTime(remaining)}
          </div>
          <div className="flex gap-2">
            <button 
              onClick={toggle} 
              className={`p-3 rounded-xl transition-all ${isActive ? 'bg-orange-500/20 text-orange-400 hover:bg-orange-500/30' : 'bg-orange-500 text-white hover:bg-orange-400 shadow-lg'}`}
            >
              {isActive ? <Pause className="w-5 h-5" /> : <Play className="w-5 h-5 ml-0.5" />}
            </button>
            <button 
              onClick={reset} 
              className="p-3 bg-slate-700 text-slate-300 hover:text-white rounded-xl transition-colors"
            >
              <RotateCcw className="w-5 h-5" />
            </button>
          </div>
        </div>
      );
    };

    const ProcessStep = ({ stepNum, title, shortDesc, scienceDesc, instructionList, timerProps }) => {
      const [isOpen, setIsOpen] = useState(false);
      return (
        <div className="relative pl-8 border-l-4 border-slate-200 pb-6 last:pb-0 last:border-transparent">
          <div className="absolute w-5 h-5 bg-orange-500 rounded-full -left-[14.5px] top-1 border-4 border-stone-50 shadow-sm"></div>
          
          <div 
            className="cursor-pointer group flex justify-between items-start -mt-1.5 touch-manipulation py-2 -my-2"
            onClick={() => setIsOpen(!isOpen)}
          >
            <div>
              <h3 className="font-bold text-lg text-slate-800 group-hover:text-orange-600 transition-colors flex items-center gap-2">
                Step {stepNum}: {title}
              </h3>
              <p className="text-slate-600 mt-1">{shortDesc}</p>
            </div>
            <div className={`p-2 rounded-full bg-white border border-slate-200 shadow-sm transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`}>
              <ChevronDown className="w-5 h-5 text-slate-400" />
            </div>
          </div>
          
          <div className={`overflow-hidden transition-all duration-300 ${isOpen ? 'max-h-[1200px] opacity-100 mt-4' : 'max-h-0 opacity-0'}`}>
            <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
              <ol className="list-decimal list-outside ml-4 space-y-3 text-slate-700 font-medium mb-6">
                {instructionList.map((item, idx) => (
                  <li key={idx} className="pl-2 leading-relaxed">{item}</li>
                ))}
              </ol>

              {timerProps && <PersistentTimer {...timerProps} />}

              <div className="mt-6 bg-blue-50/50 p-4 rounded-xl border border-blue-100">
                <div className="flex items-center gap-2 font-bold text-blue-800 mb-2 uppercase tracking-wider text-xs">
                  <Beaker className="w-4 h-4" /> The Science & Technique
                </div>
                <p className="text-sm text-blue-900/80 leading-relaxed">{scienceDesc}</p>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const ResourcesModal = ({ isOpen, onClose }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in">
          <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-hidden flex flex-col">
            <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
              <h2 className="text-2xl font-black text-slate-800 flex items-center gap-3">
                <BookOpen className="w-7 h-7 text-orange-500" /> 
                Artisan Resources
              </h2>
              <button onClick={onClose} className="p-3 hover:bg-slate-200 rounded-full transition-colors text-slate-500 hover:text-slate-800">
                <X className="w-7 h-7" />
              </button>
            </div>
            <div className="p-6 overflow-y-auto hide-scrollbar space-y-4 flex-1">
              <p className="text-slate-600 mb-6 font-medium text-lg leading-relaxed">Ready to dive deeper down the rabbit hole? These are the absolute best corners of the internet to expand your pizza knowledge.</p>
              
              {RESOURCES.map((res, idx) => (
                <a 
                  key={idx} href={res.url} target="_blank" rel="noopener noreferrer"
                  className="block p-5 rounded-2xl border-2 border-slate-100 hover:border-blue-200 hover:bg-blue-50 transition-all group touch-manipulation"
                >
                  <div className="flex justify-between items-start mb-2">
                    <h3 className="font-bold text-xl text-slate-800 group-hover:text-blue-700">{res.title}</h3>
                    <ExternalLink className="w-6 h-6 text-slate-400 group-hover:text-blue-500" />
                  </div>
                  <p className="text-slate-600 leading-relaxed">{res.desc}</p>
                </a>
              ))}
            </div>
          </div>
        </div>
      );
    }


    // ---------- Main Application ----------
    
    function App() {
      const [appState, setAppState] = useState('intro');
      const [numDoughs, setNumDoughs] = useState(1);
      const [showResources, setShowResources] = useState(false);
      
      const [wizDoughIdx, setWizDoughIdx] = useState(0);
      const [step, setStep] = useState(1);
      
      const [viewDoughIdx, setViewDoughIdx] = useState(0);

      const defaultCfg = {
        name: "Dough", style: "Classic Home Oven",
        balls: 3, ballWeight: 250,
        flourBase: "Bread Flour", hasBlend: false, flourBlend: "Whole Wheat", blendPct: 20,
        hydration: 64, salt: 2.2, oil: 3, sugar: 2,
        cold: true, room: 72,
      };

      const [configs, setConfigs] = useState([ { ...defaultCfg, name: "Dough A" }, { ...defaultCfg, name: "Dough B" } ]);

      const updateCfg = (idx, updates) => {
        setConfigs(prev => {
          const newConfigs = [...prev];
          let c = { ...newConfigs[idx], ...updates };
          
          if (updates.style && updates.style !== prev[idx].style) {
            const s = STYLES[updates.style];
            c.flourBase = s.flour; c.hydration = s.h; c.salt = s.s; c.oil = s.o; c.sugar = s.sg; c.hasBlend = false; 
          }

          if (updates.flourBase || updates.flourBlend || updates.blendPct !== undefined || updates.hasBlend !== undefined) {
            const idealH = calcIdealHydration(c.flourBase, c.hasBlend ? c.flourBlend : null, c.hasBlend ? c.blendPct : 0);
            if (updates.flourBase || updates.flourBlend || updates.hasBlend !== undefined) {
              c.hydration = idealH;
            }
          }

          newConfigs[idx] = c;
          return newConfigs;
        });
      };

      // --- Screen: Intro ---
      if (appState === 'intro') {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <ResourcesModal isOpen={showResources} onClose={() => setShowResources(false)} />
            
            <div className="bg-white max-w-md w-full p-8 rounded-[2rem] shadow-xl text-center border border-slate-100 relative">
              <button 
                onClick={() => setShowResources(true)}
                className="absolute top-6 right-6 p-3 text-slate-400 hover:text-orange-500 hover:bg-orange-50 rounded-full transition-colors touch-manipulation"
                title="Library & Resources"
              >
                <BookOpen className="w-7 h-7" />
              </button>

              <div className="w-24 h-24 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <Pizza className="w-12 h-12 text-orange-500" />
              </div>
              <h1 className="text-4xl font-black text-slate-800 mb-2 tracking-tight">D'ough!</h1>
              <p className="text-slate-500 mb-10 text-lg font-medium">Advanced Artisan Pizza Calculator</p>
              
              <div className="space-y-4 text-left">
                <h2 className="font-bold text-slate-700 text-center mb-6 text-lg">How many distinct doughs are you making today?</h2>
                
                <button onClick={() => { setNumDoughs(1); setAppState('wizard'); setWizDoughIdx(0); setStep(1); }} 
                        className="w-full flex items-center p-5 rounded-2xl border-2 border-slate-100 hover:border-orange-500 hover:bg-orange-50 transition-all group touch-manipulation">
                  <div className="bg-slate-100 group-hover:bg-orange-200 p-4 rounded-xl mr-5 transition-colors">
                    <Pizza className="w-7 h-7 text-slate-600 group-hover:text-orange-600" />
                  </div>
                  <div>
                    <div className="font-bold text-xl text-slate-800 group-hover:text-orange-700 mb-1">One Dough</div>
                    <div className="text-slate-500">I'm making a single batch.</div>
                  </div>
                </button>
                
                <button onClick={() => { setNumDoughs(2); setAppState('wizard'); setWizDoughIdx(0); setStep(1); }} 
                        className="w-full flex items-center p-5 rounded-2xl border-2 border-slate-100 hover:border-blue-500 hover:bg-blue-50 transition-all group touch-manipulation">
                  <div className="bg-slate-100 group-hover:bg-blue-200 p-4 rounded-xl mr-5 transition-colors">
                    <div className="flex -space-x-3">
                      <Pizza className="w-7 h-7 text-slate-600 group-hover:text-blue-600 relative z-10" />
                      <Pizza className="w-7 h-7 text-slate-400 group-hover:text-blue-400" />
                    </div>
                  </div>
                  <div>
                    <div className="font-bold text-xl text-slate-800 group-hover:text-blue-700 mb-1">Two Doughs</div>
                    <div className="text-slate-500">Compare styles side-by-side.</div>
                  </div>
                </button>
              </div>
            </div>
          </div>
        );
      }

      // --- Screen: Wizard ---
      if (appState === 'wizard') {
        const cfg = configs[wizDoughIdx];
        const setC = (updates) => updateCfg(wizDoughIdx, updates);
        
        const idealHydration = calcIdealHydration(cfg.flourBase, cfg.hasBlend ? cfg.flourBlend : null, cfg.hasBlend ? cfg.blendPct : 0);

        const nextStep = () => {
          if (step < 4) {
            setStep(s => s + 1);
          } else {
            if (numDoughs === 2 && wizDoughIdx === 0) {
              setWizDoughIdx(1); setStep(1);
            } else {
              setAppState('recipes');
            }
          }
        };

        // --- Dynamic Advice Generators ---
        const getPizzaAdvice = (n) => {
          if (n <= 2) return "Perfect for a solo meal or a date night.";

                      </p>
                    </div>
                  </div>
                )}
              </div>

              {/* Wizard Footer */}
              <div className="p-6 bg-white border-t border-slate-200 flex justify-between shrink-0 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] md:rounded-b-[2rem]">

                >

                <button

                >
                  {step < 4 ? 'Continue' : (numDoughs === 2 && wizDoughIdx === 0 ? 'Configure Dough B' : 'View Recipe')} 
                  <ChevronRight className="w-6 h-6" />
                </button>
              </div>

            </div>
          </div>
        );
      }

      // --- Screen: Recipes ---
      if (appState === 'recipes') {

              <div className="flex items-center gap-3 w-full md:w-auto">
                {numDoughs === 2 && (

                    {configs.map((c, idx) => (

                <button

                  <BookOpen className="w-6 h-6" />

            <div className="w-full max-w-2xl relative pb-20">

      return null;

    const RecipeView = ({ config }) => {
      const recipe = useMemo(() => computeRecipe(config), [config]);

      return (
        <div className="space-y-8">
          <div className="bg-white rounded-[2rem] shadow-md border border-slate-200 overflow-hidden">

                return (

                    <div>

            <div className="space-y-4">

                shortDesc="Mix only flour and water. Let it rest."
                instructionList={[

                  "Mix until no dry flour remains. Do not knead yet.",

                scienceDesc="Autolyse gives flour time to fully absorb water. Enzymes begin breaking down starches into sugars (for flavor and browning) and proteins into extensible gluten. This makes the dough incredibly stretchy, deeply improves flavor, and significantly reduces your active kneading time. It is especially crucial for whole grain flours to soften the bran."
                timerProps={{ id: `auto-${config.name}`, initialSeconds: 1800 }}

                scienceDesc="Kneading aligns gluten proteins into a strong web-like structure. Salt tightens this network, which is why we add it after the autolyse. The 'Windowpane Test' dictates readiness: pinch off a golf-ball sized piece of dough and gently stretch it with your fingers. If you can stretch it thin enough to let light pass through without tearing, the gluten network is fully developed."

                timerProps={{ id: `bulk-${config.name}`, initialSeconds: 7200 }}

                shortDesc={`Divide into ${config.balls} balls. ${config.cold ? "Cold ferment in fridge." : "Proof at room temp."}`}

            </div>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
