<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D'ough! Pizza App</title>
  
  <!-- Load Tailwind CSS for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Setup Import Map for React and Icons -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0?external=react"
      }
    }
  </script>
  
  <!-- Load Babel to compile JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-stone-50">
  
  <!-- This is where the React App will render -->
  <div id="root"></div>

  <!-- Our React Application Script -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Pizza, Play, Pause, RotateCcw, ChevronRight, ChevronLeft, 
      Check, Thermometer, Droplets, Scale, Clock, Settings, ChefHat,
      ChevronDown, Info, Beaker
    } from 'lucide-react';

    // ---------- Utilities ----------
    const clamp = (n, min, max) => Math.min(max, Math.max(min, Number.isFinite(n) ? n : min));
    const r1 = (n) => Math.round((Number.isFinite(n) ? n : 0) * 10) / 10;
    const r0 = (n) => Math.round(Number.isFinite(n) ? n : 0);

    const formatTime = (seconds) => {
      const t = Math.max(0, Math.floor(Number.isFinite(seconds) ? seconds : 0));
      const m = String(Math.floor(t / 60)).padStart(2, "0");
      const s = String(t % 60).padStart(2, "0");
      return `${m}:${s}`;
    };

    // ---------- Density for volume hints ----------
    const DENSITY = { yeast: 3.1, salt: 6, sugar: 4, oil: 4.5 };

    const tspApprox = (t) => {
      const map = { 0.25: "¼ tsp", 0.33: "⅓ tsp", 0.5: "½ tsp", 0.75: "¾ tsp", 1: "1 tsp", 1.5: "1 ½ tsp", 2: "2 tsp", 3: "1 tbsp" };
      let best = 0, err = 99;
      Object.keys(map).forEach(k => {
        const e = Math.abs(t - parseFloat(k));
        if (e < err) { err = e; best = k; }
      });
      return map[best] || `${t.toFixed(1)} tsp`;
    };

    const volHint = (type, g, yeastType) => {
      if (!g || g >= 15) return "";
      if (type === "yeast") {
        if (yeastType === "Fresh") return g < 2 ? "≈ pea-sized" : "≈ marble-sized";
        return `≈ ${tspApprox(g / DENSITY.yeast)}`;
      }
      if (type === "salt") return `≈ ${tspApprox(g / DENSITY.salt)}`;
      if (type === "sugar") return `≈ ${tspApprox(g / DENSITY.sugar)}`;
      if (type === "oil") return `≈ ${tspApprox(g / DENSITY.oil)}`;
      return "";
    };

    // ---------- Presets ----------
    const PRESETS = {
      "Neapolitan": { h: 62, s: 2.6, o: 0, sg: 0, desc: "High heat, airy crust" },
      "NY Style": { h: 65, s: 2.3, o: 2, sg: 1.5, desc: "Foldable, crispy bottom" },
      "Sicilian": { h: 75, s: 2.5, o: 3, sg: 2, desc: "Thick, pan-baked square" },
      "Classic": { h: 63, s: 2.4, o: 1, sg: 0.5, desc: "Great for home ovens" }
    };

    // ---------- Recipe Engine ----------
    function yeastPct(cold, temp) {
      let base = cold ? 0.3 : 0.5;
      if (temp > 78) base -= 0.1;
      if (temp < 68) base += 0.1;
      return clamp(base, 0.1, 1.2);
    }

    function computeRecipe(cfg) {
      const totalWeight = cfg.balls * cfg.ballWeight;
      const yPct = yeastPct(cfg.cold, cfg.room);
      
      // Total baker's percentage
      const sumPct = 100 + cfg.hydration + cfg.salt + yPct + cfg.oil + cfg.sugar;
      
      const totalFlour = totalWeight * (100 / sumPct);
      const isBlend = cfg.flour === 'Whole Wheat' || cfg.flour === 'Spelt Blend';
      const blendRatio = isBlend ? (cfg.blendPct / 100) : 0;
      
      return {
        flourMain: r0(totalFlour * (1 - blendRatio)),
        flourAlt: isBlend ? r0(totalFlour * blendRatio) : 0,
        water: r0(totalFlour * cfg.hydration / 100),
        salt: r1(totalFlour * cfg.salt / 100),
        yeast: r1(totalFlour * yPct / 100),
        oil: r1(totalFlour * cfg.oil / 100),
        sugar: r1(totalFlour * cfg.sugar / 100),
        yPct: r1(yPct),
        total: r0(totalWeight),
        totalFlour: r0(totalFlour)
      };
    }

    // ---------- UI Components ----------

    const RangeSlider = ({ label, min, max, step = 1, value, onChange, unit = "", icon: Icon, advice = "" }) => (
      <div className="mb-6">
        <div className="flex justify-between items-end mb-2">
          <label className="font-medium text-slate-700 flex items-center gap-2">
            {Icon && <Icon className="w-4 h-4 text-orange-500" />}
            {label}
          </label>
          <span className="text-lg font-bold text-orange-600">{value}{unit}</span>
        </div>
        <input 
          type="range" min={min} max={max} step={step} value={value} 
          onChange={(e) => onChange(parseFloat(e.target.value))}
          className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-orange-500" 
        />
        {advice && (
          <div className="mt-2 flex items-start gap-1.5 text-sm text-slate-500 bg-slate-50 p-2 rounded-lg border border-slate-100">
            <Info className="w-4 h-4 text-blue-400 shrink-0 mt-0.5" />
            <p className="leading-tight">{advice}</p>
          </div>
        )}
      </div>
    );

    const ProcessStep = ({ stepNum, title, shortDesc, scienceDesc, children }) => {
      const [isOpen, setIsOpen] = React.useState(false);
      return (
        <div className="relative pl-6 border-l-2 border-orange-200">
          <div className="absolute w-3 h-3 bg-orange-500 rounded-full -left-[7px] top-1.5"></div>
          <div 
            className="cursor-pointer hover:bg-slate-50 p-2 -ml-2 rounded-lg transition-colors flex justify-between items-start"
            onClick={() => setIsOpen(!isOpen)}
          >
            <div>
              <h3 className="font-bold text-slate-800 mb-1">{stepNum}. {title}</h3>
              <p className="text-slate-600 text-sm">{shortDesc}</p>
            </div>
            {isOpen ? <ChevronDown className="w-5 h-5 text-slate-400 mt-1 shrink-0" /> : <ChevronRight className="w-5 h-5 text-slate-400 mt-1 shrink-0" />}
          </div>
          
          {isOpen && (
            <div className="mt-2 mb-4 ml-0 animate-in fade-in duration-200">
              <div className="bg-orange-50/80 p-4 rounded-xl text-sm text-slate-700 border border-orange-100 shadow-inner space-y-3">
                <div className="flex items-center gap-2 font-semibold text-orange-800">
                  <Beaker className="w-4 h-4" /> The Science
                </div>
                <p className="leading-relaxed">{scienceDesc}</p>
                {children && <div className="mt-4">{children}</div>}
              </div>
            </div>
          )}
        </div>
      );
    };

    const Timer = ({ initialSeconds }) => {
      const [seconds, setSeconds] = React.useState(initialSeconds);
      const [isActive, setIsActive] = React.useState(false);

      React.useEffect(() => {
        let interval = null;
        if (isActive && seconds > 0) {
          interval = setInterval(() => setSeconds(s => s - 1), 1000);
        } else if (seconds === 0) {
          setIsActive(false);
        }
        return () => clearInterval(interval);
      }, [isActive, seconds]);

      const toggle = () => setIsActive(!isActive);
      const reset = () => { setIsActive(false); setSeconds(initialSeconds); };

      return (
        <div className="flex items-center gap-4 bg-orange-50 p-3 rounded-xl border border-orange-100">
          <div className="text-3xl font-mono font-bold text-orange-600 tracking-wider w-24">
            {formatTime(seconds)}
          </div>
          <div className="flex gap-2">
            <button 
              onClick={toggle} 
              className="p-3 bg-orange-500 hover:bg-orange-600 text-white rounded-full transition-colors"
            >
              {isActive ? <Pause className="w-5 h-5" /> : <Play className="w-5 h-5 ml-0.5" />}
            </button>
            <button 
              onClick={reset} 
              className="p-3 bg-white text-slate-600 hover:text-orange-600 rounded-full border border-slate-200 transition-colors"
            >
              <RotateCcw className="w-5 h-5" />
            </button>
          </div>
        </div>
      );
    };

    // ---------- Main App ----------
    function App() {
      const [step, setStep] = React.useState(1);
      const [isComplete, setIsComplete] = React.useState(false);
      
      const [cfg, setCfg] = React.useState({
        style: "Classic",
        flour: "Bread Flour",
        yeast: "Instant",
        balls: 3,
        ballWeight: 250,
        hydration: 63,
        salt: 2.4,
        oil: 1,
        sugar: 0.5,
        cold: false,
        room: 72,
        blendPct: 20,
      });

      const recipe = React.useMemo(() => computeRecipe(cfg), [cfg]);
      const totalSteps = 5;

      const handleNext = () => setStep(s => Math.min(totalSteps, s + 1));
      const handlePrev = () => setStep(s => Math.max(1, s - 1));

      if (isComplete) {
        return (
          <div className="min-h-screen bg-stone-50 p-4 md:p-8 font-sans text-slate-800 flex justify-center">
            <div className="w-full max-w-md space-y-6">
              
              <header className="text-center space-y-2 mb-8 mt-4">
                <div className="inline-flex items-center justify-center w-16 h-16 bg-orange-100 rounded-full mb-2">
                  <Pizza className="w-8 h-8 text-orange-500" />
                </div>
                <h1 className="text-3xl font-bold text-slate-900">Your Recipe</h1>
                <p className="text-slate-500">{cfg.style} Style • {cfg.balls} Pizzas</p>
              </header>

              <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                <div className="bg-orange-500 text-white p-4 flex justify-between items-center">
                  <h2 className="font-semibold text-lg flex items-center gap-2">
                    <ChefHat className="w-5 h-5" /> Ingredients
                  </h2>
                  <span className="text-orange-100 text-sm">{recipe.total}g Total</span>
                </div>
                <div className="p-0">
                  {['flourMain', 'flourAlt', 'water', 'salt', 'yeast', 'oil', 'sugar'].map((k) => {
                    if (recipe[k] <= 0) return null;
                    const isMainFlour = k === 'flourMain';
                    const isAltFlour = k === 'flourAlt';
                    const isWater = k === 'water';
                    
                    let label = k;
                    let pctLabel = `${cfg[k] || (isWater ? cfg.hydration : recipe.yPct)}%`;
                    
                    if (isMainFlour) {
                      label = cfg.flour === 'Whole Wheat' || cfg.flour === 'Spelt Blend' ? 'White Flour Base' : cfg.flour;
                      pctLabel = `${100 - (cfg.flour === 'Whole Wheat' || cfg.flour === 'Spelt Blend' ? cfg.blendPct : 0)}%`;
                    } else if (isAltFlour) {
                      label = cfg.flour;
                      pctLabel = `${cfg.blendPct}%`;
                    }

                    return (
                      <div key={k} className="flex justify-between items-center p-4 border-b border-slate-50 last:border-0 hover:bg-slate-50 transition-colors">
                        <div>
                          <div className="font-medium capitalize text-slate-800">
                            {label}
                            {k === 'yeast' && <span className="text-xs text-slate-400 font-normal ml-1">({cfg.yeast})</span>}
                          </div>
                          <div className="text-xs text-slate-400">
                            {pctLabel}
                          </div>
                        </div>
                        <div className="text-right">
                          <div className="font-bold text-lg text-slate-900">{recipe[k]}g</div>
                          <div className="text-xs font-medium text-orange-500">
                            {volHint(k.replace('Main','').replace('Alt',''), recipe[k], cfg.yeast)}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 space-y-6">
                <h2 className="font-bold text-xl flex items-center gap-2 border-b border-slate-100 pb-4">
                  <Clock className="w-5 h-5 text-orange-500" /> Process
                </h2>
                
                <div className="space-y-4">
                  <ProcessStep 
                    stepNum={1} title="Mix & Autolyse" 
                    shortDesc="Combine flour and water. Rest to hydrate."
                    scienceDesc="Autolyse gives flour time to fully hydrate before kneading. Enzymes begin breaking down starches into sugars and proteins into extensible gluten. This makes the dough stretchier, improves flavor, and reduces your kneading time."
                  >
                    <Timer initialSeconds={1200} />
                  </ProcessStep>

                  <ProcessStep 
                    stepNum={2} title="Knead" 
                    shortDesc="Add salt, yeast, and remaining ingredients. Knead until smooth."
                    scienceDesc="Kneading aligns gluten proteins into a strong web-like structure. Salt is added now because it tightens this network. A strong gluten network is what traps CO2 later, giving your crust those beautiful airy bubbles."
                  />

                  <ProcessStep 
                    stepNum={3} title="Bulk Ferment" 
                    shortDesc={`Cover and rest at room temp (${cfg.room}°F) for 2 hours, or until doubled.`}
                    scienceDesc="During bulk fermentation, yeast consumes sugars to produce CO2 and alcohol. The large single mass regulates its own temperature better than individual balls, fostering complex organic acids which give the dough its characteristic flavor."
                  />

                  <ProcessStep 
                    stepNum={4} title="Ball & Proof" 
                    shortDesc={`Divide into ${cfg.balls} balls (${cfg.ballWeight}g). ${cfg.cold ? "Cold ferment in fridge 24-72h." : "Proof at room temp 1-2h."}`}
                    scienceDesc="Dividing the dough reorganizes the gluten network. As it proofs, the yeast produces its final burst of CO2, relaxing the gluten so it stretches easily without snapping back. Cold fermentation slows this down, trading rapid rise for deep, complex flavor development."
                  />
                </div>
              </div>

              <button 
                onClick={() => { setIsComplete(false); setStep(1); }} 
                className="w-full py-4 text-slate-500 font-medium hover:text-slate-800 flex items-center justify-center gap-2"
              >
                <RotateCcw className="w-4 h-4" /> Edit Configuration
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-stone-50 flex flex-col items-center p-4 md:p-8 font-sans text-slate-800">
          <div className="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden min-h-[500px] flex flex-col mt-4">
            
            {/* Header */}
            <div className="bg-orange-500 p-6 text-white">
              <div className="flex justify-between items-center mb-6">
                <h1 className="text-2xl font-bold flex items-center gap-2">
                  <Pizza className="w-6 h-6" /> D'ough!
                </h1>
                <span className="text-orange-200 text-sm font-medium">Step {step} of {totalSteps}</span>
              </div>
              
              {/* Progress Bar */}
              <div className="flex gap-1 h-1.5 w-full bg-orange-600/50 rounded-full overflow-hidden">
                {[...Array(totalSteps)].map((_, i) => (
                  <div 
                    key={i} 
                    className={`h-full flex-1 rounded-full transition-all duration-300 ${i < step ? 'bg-white' : 'bg-transparent'}`} 
                  />
                ))}
              </div>
            </div>

            {/* Content Body */}
            <div className="p-6 flex-1 overflow-y-auto">
              
              {step === 1 && (
                <div className="animate-in fade-in slide-in-from-right-4 duration-300">
                  <h2 className="text-xl font-bold mb-4 text-slate-800 flex items-center gap-2">
                    <Settings className="w-5 h-5 text-orange-500" /> Choose Style
                  </h2>
                  <div className="space-y-3">
                    {Object.keys(PRESETS).map(s => {
                      const p = PRESETS[s];
                      const isActive = cfg.style === s;
                      return (
                        <button 
                          key={s} 
                          className={`w-full text-left p-4 rounded-xl border-2 transition-all duration-200 ${
                            isActive ? 'border-orange-500 bg-orange-50' : 'border-slate-100 hover:border-orange-200 hover:bg-orange-50/50'
                          }`}
                          onClick={() => setCfg({
                            ...cfg, style: s, hydration: p.h, salt: p.s, oil: p.o, sugar: p.sg
                          })}
                        >
                          <div className="flex justify-between items-center">
                            <span className="font-bold text-lg text-slate-800">{s}</span>
                            {isActive && <Check className="w-5 h-5 text-orange-500" />}
                          </div>
                          <div className="text-sm text-slate-500 mt-1">{p.desc}</div>
                        </button>
                      );
                    })}
                  </div>
                </div>
              )}

              {step === 2 && (
                <div className="animate-in fade-in slide-in-from-right-4 duration-300">
                   <h2 className="text-xl font-bold mb-6 text-slate-800 flex items-center gap-2">
                    <Scale className="w-5 h-5 text-orange-500" /> Ingredients
                  </h2>
                  
                  <div className="space-y-6">
                    <div>
                      <label className="block font-medium text-slate-700 mb-2">Flour Type</label>
                      <select 
                        value={cfg.flour} 
                        onChange={e => setCfg({...cfg, flour: e.target.value})} 
                        className="w-full bg-slate-50 border border-slate-200 p-3.5 rounded-xl outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-200 transition-all text-slate-800 font-medium"
                      >
                        <option>Bread Flour</option>
                        <option>Type 00</option>
                        <option>All Purpose</option>
                        <option>Whole Wheat</option>
                        <option>Spelt Blend</option>
                      </select>
                    </div>

                    {(cfg.flour === 'Whole Wheat' || cfg.flour === 'Spelt Blend') && (
                      <div className="animate-in fade-in slide-in-from-top-2">
                        <RangeSlider 
                          label={`${cfg.flour} Percentage`} 
                          min={5} max={100} step={5} unit="%"
                          value={cfg.blendPct} 
                          onChange={v => setCfg({...cfg, blendPct: v})} 
                          advice={
                            cfg.blendPct < 20 ? "Mild flavor. Won't drastically change the dough texture." :
                            cfg.blendPct <= 40 ? "Noticeable earthy flavor. Dough will be denser and need a bit more water." :
                            "Strong, hearty flavor. Crust will be quite dense. Consider bumping up your hydration!"
                          }
                        />
                      </div>
                    )}

                    <div>
                      <label className="block font-medium text-slate-700 mb-2">Yeast Type</label>
                      <select 
                        value={cfg.yeast} 
                        onChange={e => setCfg({...cfg, yeast: e.target.value})} 
                        className="w-full bg-slate-50 border border-slate-200 p-3.5 rounded-xl outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-200 transition-all text-slate-800 font-medium"
                      >
                        <option>Instant</option>
                        <option>Active Dry</option>
                        <option>Fresh</option>
                      </select>
                    </div>
                  </div>
                </div>
              )}

              {step === 3 && (
                <div className="animate-in fade-in slide-in-from-right-4 duration-300">
                   <h2 className="text-xl font-bold mb-6 text-slate-800 flex items-center gap-2">
                    <Scale className="w-5 h-5 text-orange-500" /> Quantity
                  </h2>
                  
                  <RangeSlider 
                    label="Number of Pizzas" 
                    min={1} max={20} 
                    value={cfg.balls} 
                    onChange={v => setCfg({...cfg, balls: v})} 
                    advice={
                      cfg.balls <= 2 ? "Perfect for a solo meal or a date night." :
                      cfg.balls <= 5 ? "Great for a family dinner." :
                      "Pizza party time! Make sure you have enough oven space."
                    }
                  />
                  
                  <RangeSlider 
                    label="Dough Ball Weight" 
                    min={150} max={600} step={5} 
                    unit="g"
                    value={cfg.ballWeight} 
                    onChange={v => setCfg({...cfg, ballWeight: v})} 
                    advice={
                      cfg.ballWeight < 200 ? "Small/Personal size (8-10 inches). Yields a thinner crust." :
                      cfg.ballWeight <= 280 ? "Standard size (10-12 inches). Perfect for classic Neapolitan or NY slices." :
                      "Large size (13+ inches). Requires practice to stretch evenly without tearing!"
                    }
                  />
                  
                  <div className="bg-orange-50 text-orange-800 p-4 rounded-xl text-sm border border-orange-100 mt-8">
                    <strong>Tip:</strong> A 250g dough ball typically makes a standard 10-12 inch pizza.
                  </div>
                </div>
              )}

              {step === 4 && (
                <div className="animate-in fade-in slide-in-from-right-4 duration-300">
                  <h2 className="text-xl font-bold mb-6 text-slate-800 flex items-center gap-2">
                    <Droplets className="w-5 h-5 text-orange-500" /> Dough Tuning
                  </h2>
                  
                  <RangeSlider 
                    label="Hydration" 
                    min={50} max={90} step={1} unit="%"
                    value={cfg.hydration} 
                    onChange={v => setCfg({...cfg, hydration: v})} 
                    advice={
                      cfg.hydration < 60 ? "Stiffer dough. Easier to handle, yields a denser, crunchier crust." :
                      cfg.hydration <= 65 ? "Standard hydration. Good balance of crispness and airy chew." :
                      "Wetter dough. Harder to handle, but creates large air pockets and a very light, airy crust."
                    }
                  />
                  
                  <RangeSlider 
                    label="Salt" 
                    min={1.5} max={3.5} step={0.1} unit="%"
                    value={cfg.salt} 
                    onChange={v => setCfg({...cfg, salt: v})} 
                    advice={
                      cfg.salt < 2.0 ? "Low salt. Dough will ferment faster and may taste a bit flat." :
                      cfg.salt <= 2.5 ? "Standard level. Balances flavor and gluten strength perfectly." :
                      "High salt. Tightens the gluten network and noticeably slows down yeast activity."
                    }
                  />

                  <div className="mt-8 pt-6 border-t border-slate-100 flex items-center justify-between">
                    <div>
                      <div className="font-bold text-slate-800">Cold Ferment</div>
                      <div className="text-sm text-slate-500">Slow rise in fridge (24-72h)</div>
                    </div>
                    <button 
                      onClick={() => setCfg({...cfg, cold: !cfg.cold})}
                      className={`relative inline-flex h-7 w-12 items-center rounded-full transition-colors duration-300 focus:outline-none ${cfg.cold ? 'bg-orange-500' : 'bg-slate-200'}`}
                    >
                      <span className={`inline-block h-5 w-5 transform rounded-full bg-white transition-transform duration-300 shadow-sm ${cfg.cold ? 'translate-x-6' : 'translate-x-1'}`} />
                    </button>
                  </div>
                </div>
              )}

              {step === 5 && (
                <div className="animate-in fade-in slide-in-from-right-4 duration-300">
                   <h2 className="text-xl font-bold mb-6 text-slate-800 flex items-center gap-2">
                    <Thermometer className="w-5 h-5 text-orange-500" /> Environment
                  </h2>
                  
                  <p className="text-slate-600 mb-6">
                    Room temperature impacts how quickly your dough proofs. We'll adjust your yeast percentage automatically.
                  </p>

                  <RangeSlider 
                    label="Kitchen Temperature" 
                    min={60} max={95} step={1} unit="°F"
                    value={cfg.room} 
                    onChange={v => setCfg({...cfg, room: v})} 
                    advice={
                      cfg.room < 68 ? "Cool room. Dough will rise slowly, developing more complex flavors." :
                      cfg.room <= 75 ? "Ideal temperature for a steady, predictable rise." :
                      "Warm room. Yeast will be very active; keep a close eye on your dough so it doesn't overproof!"
                    }
                  />

                  <div className="bg-slate-50 border border-slate-200 p-4 rounded-xl mt-8">
                    <div className="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-1">Calculated Yeast</div>
                    <div className="text-2xl font-bold text-slate-800">{yeastPct(cfg.cold, cfg.room).toFixed(2)}%</div>
                    <div className="text-xs text-slate-400 mt-1">Adjusted for {cfg.room}°F {cfg.cold ? 'with cold ferment' : 'room temp ferment'}</div>
                  </div>
                </div>
              )}

            </div>

            {/* Footer Navigation */}
            <div className="p-6 bg-slate-50 border-t border-slate-100 flex justify-between items-center gap-4">
              {step > 1 ? (
                <button 
                  onClick={handlePrev} 
                  className="px-6 py-3 font-medium text-slate-600 bg-white border border-slate-200 rounded-xl hover:bg-slate-100 transition-colors flex items-center gap-2"
                >
                   <ChevronLeft className="w-4 h-4" /> Back
                </button>
              ) : (
                <div /> // Spacer
              )}
              
              {step < totalSteps ? (
                <button 
                  onClick={handleNext} 
                  className="px-6 py-3 font-medium text-white bg-slate-900 rounded-xl hover:bg-slate-800 transition-colors flex items-center gap-2 ml-auto shadow-sm"
                >
                  Next <ChevronRight className="w-4 h-4" />
                </button>
              ) : (
                <button 
                  onClick={() => setIsComplete(true)} 
                  className="px-8 py-3 font-bold text-white bg-orange-500 rounded-xl hover:bg-orange-600 transition-all transform hover:-translate-y-0.5 shadow-md flex items-center gap-2 ml-auto"
                >
                  View Recipe <Check className="w-5 h-5" />
                </button>
              )}
            </div>
            
          </div>
        </div>
      );
    }

    // Initialize React and render the App component
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
